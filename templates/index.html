<!DOCTYPE html>
<html>
<head>

<title>Siggy AI</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
}

.chat{
width:700px;
margin-top:40px;
}

.messages{
height:500px;
overflow-y:auto;
border:1px solid #334155;
padding:20px;
background:#020617;
border-radius:10px;
}

.user{
text-align:right;
margin:10px;
}

.bot{
text-align:left;
margin:10px;
color:#38bdf8;
}

input{
width:80%;
padding:10px;
}

button{
padding:10px;
}

</style>

</head>

<body>

<div class="chat">

<h2>Siggy AI</h2>

<div id="messages" class="messages"></div>

<br>

<input id="msg" placeholder="Ask Siggy">

<button onclick="send()">Send</button>

</div>

<script>

async function send(){

let msg=document.getElementById("msg").value

let box=document.getElementById("messages")

box.innerHTML+=`<div class="user">${msg}</div>`

let res=await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user_id:"demo",
message:msg
})
})

let data=await res.json()

box.innerHTML+=`<div class="bot">${data.response}</div>`

box.scrollTop=box.scrollHeight

document.getElementById("msg").value=""

}

</script>

</body>
</html>
